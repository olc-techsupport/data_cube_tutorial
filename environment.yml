name: tribal-datacube
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Core data cube stack
  - xarray>=2023.6
  - rioxarray>=0.15
  - numpy>=1.24
  - pandas>=2.0
  # Geospatial
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - fiona>=1.9
  - rasterio>=1.3
  # Data access
  - requests>=2.31
  - netcdf4>=1.6        # OPeNDAP access for gridMET
  - h5netcdf>=1.1       # HDF5/NetCDF backend
  - zarr>=2.16          
  # Visualization
  - matplotlib>=3.7
  - cartopy>=0.22
  - contextily>=1.4
  - hvplot>=0.9         
  - holoviews>=1.17
  - seaborn>=0.12
  # Notebooks
  - jupyter>=1.0
  - jupyterlab>=4.0
  - ipykernel>=6.0
  - ipywidgets>=8.0
  # Open Data Cube (notebook 07)
  - datacube>=1.8
  - pip:
    - pydap==3.5.9
